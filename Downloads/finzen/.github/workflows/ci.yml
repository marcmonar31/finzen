name: CI

on:
  push:
    branches: [main, "bloque-*"]
  pull_request:
    branches: [main]

jobs:
  # ── Backend tests ──────────────────────────────────────────────────────────
  backend:
    name: Backend tests (Python 3.11)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest -v --tb=short

      - name: Lint (ruff)
        run: ruff check . || true   # No bloquea CI, solo avisa

  # ── Frontend build + typecheck ─────────────────────────────────────────────
  frontend:
    name: Frontend build (Node 20)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check + build
        run: npm run build
        env:
          # Sin estas variables, la app usa modo local (sin Supabase)
          VITE_SUPABASE_URL: ""
          VITE_SUPABASE_ANON_KEY: ""
